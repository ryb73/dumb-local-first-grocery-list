# Rate limiting: 10 requests/second per IP, allowing bursts up to 20
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Hide nginx version for security
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # COOP/COEP headers required for SharedArrayBuffer and OPFS
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy - adjust as needed for your app
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https:; worker-src 'self' blob:;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    location / {
        # Apply rate limiting
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # TODO evaluate caching policy
    # # Cache static assets
    # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    #     # Re-add COOP/COEP headers in this location block
    #     add_header Cross-Origin-Opener-Policy "same-origin" always;
    #     add_header Cross-Origin-Embedder-Policy "require-corp" always;
    # }
}

