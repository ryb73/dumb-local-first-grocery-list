# fly.toml app configuration file generated for back-end-restless-shadow-5201 on 2025-10-30T23:23:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'back-end-restless-shadow-5201'
primary_region = 'lhr'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
